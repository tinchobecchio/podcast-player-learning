<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css" integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- Navigation  -->
     <div class="nav-wrapper">
        <nav class="nav">
            <h1 class="nav-title">Podcast Player</h1>
            <i class="fa-solid fa-microphone-lines"></i>
        </nav>
     </div>

     <div class="page-wrapper">
        <!-- Search Container -->
         <div class="search-container">
            <!-- Search History -->
            <div class="custom-select">
                <select name="" id="searchHistory" class="searchHistory" title="Search History">
                    <option value="">Select a Previous Search</option>
                </select>
            </div>
            <!-- Search Input  -->
            <input type="text" name="" id="searchInput" placeholder="Search by Podcast / Topic">
            <!-- Search Buttons -->
             <div class="search-buttons">
                <button type="button" id="searchButton">Search</button>
                <button type="button" id="resetButton">Clear History</button>
             </div>
         </div>

         <!-- Main Container -->
        <div class="main-container">
            <!-- Loader -->
             <div class="loader-container">
                <i class="fa-solid fa-microphone-lines"></i>
             </div>
        </div>

        <!-- Player Container -->
        <div class="player-container">
            <div class="player">
            </div>
            
            <div class="queue">
            </div>
        </div>
     </div>
    <script src="script.js"></script>
</body>
</html>
